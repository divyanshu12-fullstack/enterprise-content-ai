version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: contentai_user
      POSTGRES_PASSWORD: contentai_password
      POSTGRES_DB: contentai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+psycopg://contentai_user:contentai_password@postgres:5432/contentai_db
      JWT_SECRET: dev-change-me-in-production-1234
      ENCRYPTION_KEY: y2eK4z5y1r8d8A2V7B3s4dF9G1h5j8k3l5z2x9c0v9b= # Must be valid fernet key length (or just configure actual)
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-3.1-flash
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DB_AUTO_CREATE: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
